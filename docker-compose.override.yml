services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    volumes:
      - ./app:/app
    ports:
      - "8080:3000"
    command: ["make", "dev"]
    depends_on:
      db:
        condition: service_healthy
  
  caddy:
    build: 
      context: .
      dockerfile: services/caddy/Dockerfile
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
